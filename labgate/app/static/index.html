<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LabGate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0066FF;
            --primary-dark: #0044CC;
            --accent: #FF3333;
            --accent-dark: #CC0000;
            --success: #00CC66;
            --bg: #F5F7FA;
            --card: #FFFFFF;
            --text: #1A1A1A;
            --text-secondary: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 4px 20px rgba(0, 102, 255, 0.12);
            --radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 32px 0 24px;
            animation: fadeInDown 0.6s ease;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #0066FF 0%, #FF3333 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 8px;
        }

        /* Cards */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            animation: fadeInUp 0.5s ease;
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .card h2 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text);
        }

        /* Forms */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            background: var(--card);
            color: var(--text);
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
            transform: translateY(-1px);
        }

        /* Buttons */
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:active::after {
            width: 300px;
            height: 300px;
        }

        button.primary {
            background: linear-gradient(135deg, #0066FF 0%, #0044CC 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(0, 102, 255, 0.4);
        }

        button.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 102, 255, 0.5);
        }

        button.danger {
            background: linear-gradient(135deg, #FF3333 0%, #CC0000 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(255, 51, 51, 0.4);
        }

        button.success {
            background: linear-gradient(135deg, #00CC66 0%, #00AA55 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(0, 204, 102, 0.4);
        }

        button.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 122, 255, 0.5);
        }

        button.primary:active {
            transform: translateY(0);
        }

        button.danger {
            background: linear-gradient(135deg, var(--danger) 0%, #D63228 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(255, 59, 48, 0.4);
        }

        button.success {
            background: linear-gradient(135deg, var(--success) 0%, #28A745 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(52, 199, 89, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Status messages */
        .status {
            text-align: center;
            padding: 14px 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            font-weight: 500;
            animation: slideIn 0.4s ease;
        }

        .status.error {
            background: linear-gradient(135deg, #FFE5E5 0%, #FFD0D0 100%);
            color: #CC0000;
            border: 1px solid rgba(255, 51, 51, 0.2);
        }

        .status.success {
            background: linear-gradient(135deg, #E5FFE5 0%, #D0FFD0 100%);
            color: #00AA55;
            border: 1px solid rgba(0, 204, 102, 0.2);
        }

        /* User info */
        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: linear-gradient(135deg, #0066FF 0%, #FF3333 100%);
            border-radius: var(--radius);
            margin-bottom: 16px;
            box-shadow: 0 4px 14px rgba(0, 102, 255, 0.3);
        }

        .user-info span {
            font-size: 14px;
            font-weight: 500;
            color: white;
        }

        .logout-btn {
            width: auto;
            padding: 8px 16px;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Role badges */
        .role-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .role-developer { background: linear-gradient(135deg, #0066FF 0%, #FF3333 100%); color: white; }
        .role-admin { background: linear-gradient(135deg, #FF3333 0%, #CC0000 100%); color: white; }
        .role-student { background: linear-gradient(135deg, #0066FF 0%, #0044CC 100%); color: white; }

        /* Lists */
        .user-list-item,
        .qr-item {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 10px;
            background: var(--bg);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .user-list-item:hover,
        .qr-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .qr-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .qr-item > div:first-child {
            flex: 1;
            min-width: 200px;
        }

        .qr-secret {
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 13px;
            color: #0066FF;
            background: rgba(0, 102, 255, 0.1);
            padding: 6px 10px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 6px;
            word-break: break-all;
        }

        .qr-item small {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .qr-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .qr-actions button {
            width: auto;
            padding: 8px 14px;
            font-size: 12px;
        }

        /* Stats */
        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-item strong {
            color: var(--text);
            font-weight: 600;
        }

        /* Scan section */
        .scan-section {
            text-align: center;
        }

        #qrVideo {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 16px;
            display: none;
            background: #000;
        }

        #qrReader {
            margin-bottom: 16px;
        }

        .scan-manual {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed var(--border);
        }

        .scan-manual p {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 16px;
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, var(--bg) 25%, rgba(255,255,255,0.5) 50%, var(--bg) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
            height: 50px;
            margin-bottom: 10px;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 16px 12px 32px;
            }

            .header h1 {
                font-size: 28px;
            }

            .card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>LabGate</h1>
            <p>Система учёта посещений</p>
        </div>

        <div id="status" class="status hidden"></div>

        <!-- Login Form -->
        <div id="loginCard" class="card">
            <h2 style="text-align: center; margin-bottom: 20px;">Вход</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <input type="text" id="username" placeholder="Введите имя" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="Введите пароль" required autocomplete="current-password">
                </div>
                <button type="submit" class="primary">Войти</button>
            </form>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="hidden">
            <div class="user-info">
                <span id="userInfo">Пользователь</span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>

            <!-- Developer Panel -->
            <div id="developerPanel" class="hidden">
                <div class="card">
                    <h2>✨ Создать пользователя</h2>
                    <form id="createUserForm">
                        <div class="form-group">
                            <label for="newUsername">Имя пользователя</label>
                            <input type="text" id="newUsername" placeholder="Придумайте имя" required>
                        </div>
                        <div class="form-group">
                            <label for="newPassword">Пароль</label>
                            <input type="password" id="newPassword" placeholder="Придумайте пароль" required>
                        </div>
                        <div class="form-group">
                            <label for="newRole">Роль</label>
                            <select id="newRole" required>
                                <option value="admin">👨‍💼 Админ</option>
                                <option value="student">🎓 Студент</option>
                                <option value="developer">👨‍💻 Разработчик</option>
                            </select>
                        </div>
                        <button type="submit" class="primary">Создать пользователя</button>
                    </form>
                </div>

                <div class="card">
                    <h2>👥 Пользователи</h2>
                    <div id="userList"></div>
                </div>
            </div>

            <!-- Admin Panel -->
            <div id="adminPanel" class="hidden">
                <div class="card">
                    <h2>🔑 Создать QR-код</h2>
                    <form id="createQrForm">
                        <div class="form-group">
                            <label for="qrLabel">Название (опционально)</label>
                            <input type="text" id="qrLabel" placeholder="Например: Lab A - Morning">
                        </div>
                        <button type="submit" class="primary">Создать QR</button>
                    </form>
                </div>

                <div class="card">
                    <h2>📱 QR-коды</h2>
                    <div id="qrList"></div>
                </div>

                <div class="card">
                    <h2>📊 Посещения сегодня</h2>
                    <div id="todayAttendance"></div>
                </div>

                <div class="card">
                    <h2>📈 Статистика</h2>
                    <div id="attendanceStats"></div>
                </div>
            </div>

            <!-- Student Panel -->
            <div id="studentPanel" class="hidden">
                <div class="card scan-section">
                    <h2>📷 Сканировать QR</h2>
                    <video id="qrVideo" autoplay playsinline></video>
                    <div id="qrReader" style="margin-top: 16px;"></div>
                    <button id="scanBtn" class="primary" onclick="startScan()" style="margin-top: 16px;">Открыть камеру</button>
                    <div class="scan-manual">
                        <p>— или введите секрет вручную —</p>
                        <div class="form-group">
                            <label for="manualSecret">Секрет из QR</label>
                            <input type="text" id="manualSecret" placeholder="Введите секрет">
                        </div>
                        <button class="primary" onclick="manualScan()">Отметиться</button>
                    </div>
                </div>

                <div class="card">
                    <h2>📋 Мои посещения</h2>
                    <div id="myAttendance"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script>
        const API_BASE = window.location.origin + '/api/v1';
        let token = localStorage.getItem('token');
        let currentUser = null;
        let html5QrCode = null;
        let isScanning = false;

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
            status.classList.remove('hidden');
            setTimeout(() => status.classList.add('hidden'), 3000);
        }

        function checkAuth() {
            const storedToken = localStorage.getItem('token');
            if (storedToken) {
                token = storedToken;
                loadUserInfo();
            }
        }

        async function loadUserInfo() {
            try {
                const res = await fetch(`${API_BASE}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const user = await res.json();
                    currentUser = user;
                    document.getElementById('userInfo').textContent = `${user.username} • ${translateRole(user.role)}`;
                    document.getElementById('loginCard').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    
                    document.getElementById('developerPanel').classList.add('hidden');
                    document.getElementById('adminPanel').classList.add('hidden');
                    document.getElementById('studentPanel').classList.add('hidden');
                    
                    if (user.role === 'developer') {
                        document.getElementById('developerPanel').classList.remove('hidden');
                        loadUsers();
                    } else if (user.role === 'admin') {
                        document.getElementById('adminPanel').classList.remove('hidden');
                        loadQrCodes();
                        loadTodayAttendance();
                        loadStats();
                    } else if (user.role === 'student') {
                        document.getElementById('studentPanel').classList.remove('hidden');
                        loadMyAttendance();
                    }
                } else {
                    logout();
                }
            } catch (e) {
                console.error(e);
            }
        }

        function translateRole(role) {
            const roles = { 'developer': 'Разработчик', 'admin': 'Админ', 'student': 'Студент' };
            return roles[role] || role;
        }

        // Developer functions
        async function loadUsers() {
            try {
                const res = await fetch(`${API_BASE}/auth/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const list = document.getElementById('userList');
                if (res.ok) {
                    const users = await res.json();
                    if (users.length === 0) {
                        list.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 20px;">Нет пользователей</p>';
                    } else {
                        list.innerHTML = users.map(u => 
                            `<div class="user-list-item">
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <span style="font-weight: 500;">${u.username}</span>
                                    <span class="role-badge role-${u.role}">${translateRole(u.role)}</span>
                                </div>
                            </div>`
                        ).join('');
                    }
                } else {
                    list.innerHTML = '<p style="color: var(--text-secondary); text-align: center;">Не удалось загрузить</p>';
                }
            } catch (e) {
                document.getElementById('userList').innerHTML = '<p style="color: var(--text-secondary); text-align: center;">Ошибка</p>';
            }
        }

        document.getElementById('createUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('newUsername').value;
            const password = document.getElementById('newPassword').value;
            const role = document.getElementById('newRole').value;

            try {
                const res = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password, role })
                });

                if (res.ok) {
                    showStatus('✅ Пользователь создан!', 'success');
                    document.getElementById('createUserForm').reset();
                    loadUsers();
                } else {
                    const err = await res.json();
                    showStatus('❌ ' + (err.detail || 'Ошибка'), 'error');
                }
            } catch (e) {
                showStatus('❌ Ошибка соединения', 'error');
            }
        });

        // Admin functions
        async function loadQrCodes() {
            try {
                const res = await fetch(`${API_BASE}/attendance/qr/list`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const list = document.getElementById('qrList');
                if (res.ok) {
                    const qrs = await res.json();
                    if (qrs.length === 0) {
                        list.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 20px;">Нет QR-кодов. Создайте первый!</p>';
                    } else {
                        list.innerHTML = qrs.map(qr => 
                            `<div class="qr-item">
                                <div>
                                    <div class="qr-secret">${qr.secret}</div>
                                    <div style="font-size: 12px; color: var(--text-secondary);">
                                        ${qr.label || 'Без названия'} • ${qr.is_active ? '✅ Активен' : '❌ Неактивен'}
                                    </div>
                                </div>
                                <div class="qr-actions">
                                    ${qr.is_active 
                                        ? `<button class="danger" onclick="deactivateQr('${qr.id}')">Отключить</button>`
                                        : `<button class="success" onclick="activateQr('${qr.id}')">Включить</button>`
                                    }
                                    <button class="danger" onclick="deleteQr('${qr.id}')" style="background: linear-gradient(135deg, #8E8E93 0%, #6E6E73 100%);">Удалить</button>
                                </div>
                            </div>`
                        ).join('');
                    }
                } else {
                    list.innerHTML = '<p style="color: var(--text-secondary); text-align: center;">Ошибка загрузки</p>';
                }
            } catch (e) {
                document.getElementById('qrList').innerHTML = '<p style="color: var(--text-secondary); text-align: center;">Ошибка</p>';
            }
        }

        document.getElementById('createQrForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const label = document.getElementById('qrLabel').value;

            try {
                const res = await fetch(`${API_BASE}/attendance/qr/generate`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ label })
                });

                if (res.ok) {
                    showStatus('✅ QR-код создан!', 'success');
                    document.getElementById('createQrForm').reset();
                    loadQrCodes();
                } else {
                    const err = await res.json();
                    showStatus('❌ ' + (err.detail || 'Ошибка'), 'error');
                }
            } catch (e) {
                showStatus('❌ Ошибка соединения', 'error');
            }
        });

        async function deactivateQr(id) {
            try {
                const res = await fetch(`${API_BASE}/attendance/qr/${id}/deactivate`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    showStatus('QR отключён', 'success');
                    loadQrCodes();
                }
            } catch (e) {
                showStatus('Ошибка', 'error');
            }
        }

        async function activateQr(id) {
            try {
                const res = await fetch(`${API_BASE}/attendance/qr/${id}/activate`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    showStatus('QR включён', 'success');
                    loadQrCodes();
                }
            } catch (e) {
                showStatus('Ошибка', 'error');
            }
        }

        async function deleteQr(id) {
            if (!confirm('Удалить QR-код?')) return;
            try {
                const res = await fetch(`${API_BASE}/attendance/qr/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    showStatus('QR удалён', 'success');
                    loadQrCodes();
                }
            } catch (e) {
                showStatus('Ошибка', 'error');
            }
        }

        async function loadTodayAttendance() {
            try {
                const res = await fetch(`${API_BASE}/attendance/today`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const list = document.getElementById('todayAttendance');
                if (res.ok) {
                    const records = await res.json();
                    if (records.length === 0) {
                        list.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 20px;">Пока нет посещений</p>';
                    } else {
                        list.innerHTML = records.map(r => 
                            `<div class="stat-item">
                                <span>${r.username}</span>
                                <span style="color: var(--text-secondary);">${new Date(r.timestamp).toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'})}</span>
                            </div>`
                        ).join('');
                    }
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function loadStats() {
            try {
                const res = await fetch(`${API_BASE}/attendance/percentage`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const div = document.getElementById('attendanceStats');
                if (res.ok) {
                    const stats = await res.json();
                    div.innerHTML = `
                        <div class="stat-item"><span>Всего студентов</span><strong>${stats.total_registered_students}</strong></div>
                        <div class="stat-item"><span>Отметились</span><strong>${stats.total_attended_students}</strong></div>
                        <div class="stat-item"><span>Процент</span><strong style="color: #0066FF;">${stats.attendance_percentage}%</strong></div>
                    `;
                }
            } catch (e) {
                console.error(e);
            }
        }

        // Student functions
        async function loadMyAttendance() {
            try {
                const res = await fetch(`${API_BASE}/attendance/records`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const list = document.getElementById('myAttendance');
                if (res.ok) {
                    const records = await res.json();
                    if (records.length === 0) {
                        list.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 20px;">Нет посещений</p>';
                    } else {
                        list.innerHTML = records.map(r => 
                            `<div class="stat-item">
                                <span>${new Date(r.timestamp).toLocaleDateString('ru-RU', {day: 'numeric', month: 'long'})}</span>
                                <span style="color: var(--text-secondary);">${new Date(r.timestamp).toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'})}</span>
                            </div>`
                        ).join('');
                    }
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function startScan() {
            const scanBtn = document.getElementById('scanBtn');
            const qrVideo = document.getElementById('qrVideo');
            const qrReader = document.getElementById('qrReader');
            
            if (isScanning) {
                if (html5QrCode) {
                    await html5QrCode.stop();
                    html5QrCode = null;
                }
                isScanning = false;
                scanBtn.textContent = '📷 Открыть камеру';
                scanBtn.classList.add('primary');
                scanBtn.classList.remove('danger');
                qrVideo.style.display = 'none';
                qrReader.style.display = 'none';
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                
                qrVideo.style.display = 'block';
                qrVideo.srcObject = stream;
                qrReader.style.display = 'block';
                
                html5QrCode = new Html5Qrcode('qrReader');
                
                await html5QrCode.start(
                    { facingMode: 'environment' },
                    { 
                        fps: 10, 
                        qrbox: { width: 250, height: 250 }
                    },
                    async (decodedText) => {
                        await scanQr(decodedText);
                    }
                );
                
                isScanning = true;
                scanBtn.textContent = '⏹ Остановить';
                scanBtn.classList.remove('primary');
                scanBtn.classList.add('danger');
                
            } catch (err) {
                console.error('Camera error:', err);
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    showStatus('❌ Разрешите доступ к камере', 'error');
                } else if (window.location.protocol === 'http:') {
                    showStatus('❌ Камера требует HTTPS. Введите секрет вручную.', 'error');
                } else {
                    showStatus('❌ ' + err.message, 'error');
                }
            }
        }

        async function manualScan() {
            const secret = document.getElementById('manualSecret').value;
            if (!secret) {
                showStatus('Введите секрет', 'error');
                return;
            }
            await scanQr(secret);
        }

        async function scanQr(secret) {
            if (html5QrCode) {
                try {
                    await html5QrCode.stop();
                    html5QrCode = null;
                } catch (e) {}
            }
            const stream = document.getElementById('qrVideo').srcObject;
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            document.getElementById('qrVideo').style.display = 'none';
            document.getElementById('qrReader').style.display = 'none';
            document.getElementById('scanBtn').textContent = '📷 Открыть камеру';
            document.getElementById('scanBtn').classList.remove('danger');
            document.getElementById('scanBtn').classList.add('primary');
            isScanning = false;

            try {
                const res = await fetch(`${API_BASE}/attendance/scan`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ secret })
                });

                if (res.ok) {
                    showStatus('✅ Вы успешно отметились!', 'success');
                    document.getElementById('manualSecret').value = '';
                    loadMyAttendance();
                } else {
                    const err = await res.json();
                    showStatus('❌ ' + (err.detail || 'Ошибка'), 'error');
                }
            } catch (e) {
                showStatus('❌ Ошибка соединения', 'error');
            }
        }

        function logout() {
            if (html5QrCode) {
                html5QrCode.stop().catch(() => {});
                html5QrCode = null;
            }
            const stream = document.getElementById('qrVideo').srcObject;
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            
            localStorage.removeItem('token');
            token = null;
            currentUser = null;
            document.getElementById('loginCard').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('loginForm').reset();
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const formData = new FormData();
                formData.append('username', username);
                formData.append('password', password);

                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    body: formData
                });

                if (res.ok) {
                    const data = await res.json();
                    token = data.access_token;
                    localStorage.setItem('token', token);
                    checkAuth();
                    showStatus('✅ Добро пожаловать!', 'success');
                } else {
                    const err = await res.json();
                    showStatus('❌ ' + (err.detail || 'Ошибка входа'), 'error');
                }
            } catch (e) {
                showStatus('❌ Ошибка соединения', 'error');
            }
        });

        checkAuth();
    </script>
</body>
</html>
